<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Ojo FC - Marcadores del Mundial 2026</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151d30;
      --accent-yellow: #ffd700;
      --accent-cyan: #00e5ff;
      --text-main: #ffffff;
      --text-muted: #8a9fc4;
      --border-color: #243254;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 150px 20px; /* Margen inferior extra para los controles fijos */
      min-height: 100vh;
    }

    /* Contenedor vertical móvil 9:16 exacto en pantalla completa */
    .frame {
      width: 450px;
      height: 800px;
      background: radial-gradient(circle at top, #1c2742 0%, #0b0f19 100%);
      border: 4px solid var(--border-color);
      border-radius: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
    }

    /* Cabecera de la placa */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header .brand {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(45deg, var(--accent-cyan), var(--accent-yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .header .tagline {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Lista de partidos */
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-grow: 1;
    }

    /* Card de partido */
    .match-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .match-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    /* Bloque Selección (Bandera + Nombre) */
    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 110px;
      text-align: center;
    }
    .flag-box {
      width: 60px;
      height: 42px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      margin-bottom: 10px;
      background: #243254;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flag-box svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .team-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    /* Bloque central del marcador */
    .score-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-box {
      width: 50px;
      height: 56px;
      background: #0b0f19;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-yellow);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: scale(0.3);
      opacity: 0;
    }
    .score-box.reveal {
      transform: scale(1);
      opacity: 1;
      border-color: var(--accent-yellow);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }
    .vs-sign {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Bloque explicativo expandible */
    .why-box {
      margin-top: 0;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.4s ease;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      border-top: 0 solid transparent;
      padding-top: 0;
    }
    .why-box.show {
      margin-top: 14px;
      max-height: 100px;
      opacity: 1;
      border-top: 1px dashed var(--border-color);
      padding-top: 12px;
    }
    .why-title {
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* Footer con Fecha y Redes */
    .footer {
      text-align: center;
      border-top: 1px solid var(--border-color);
      padding-top: 20px;
      margin-top: 20px;
    }
    .footer .date {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }
    .footer .handle {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Panel inferior de control flotante (fijo en pantalla general, no se renderiza en la placa) */
    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111625;
      border-top: 2px solid #243254;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      align-items: center;
      z-index: 9999;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }
    .controls button {
      background: #1e2640;
      color: #fff;
      border: 1px solid #364570;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .controls button:hover {
      background: #283357;
      border-color: #485c96;
    }
    .controls button.primary {
      background: linear-gradient(45deg, #00b4d8, #0077b6);
      border: none;
    }
    .controls button.primary:hover {
      filter: brightness(1.1);
    }
    .controls .hint {
      width: 100%;
      text-align: center;
      font-size: 11px;
      color: #6277a1;
      margin-top: 6px;
    }

    /* Estado alternativo para simular previsualización estricta 1080x1920 en pantallas gigantes */
    body.real-size {
      padding: 0;
      background: #000;
      justify-content: center;
      align-items: center;
    }
    body.real-size .frame {
      width: 1080px;
      height: 1920px;
      transform: scale(0.45); /* Escala visual para que entre en monitores comunes */
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <!-- PLACA PRINCIPAL DE MARCADORES -->
  <div class="frame">
    <div class="header">
      <div class="brand">El Ojo FC</div>
      <div class="tagline">Pronósticos Oficiales</div>
    </div>

    <!-- Lista dinámica de partidos -->
    <div class="matches-list" id="matchesContainer">
      <!-- Los partidos cargados del JSON se inyectarán acá -->
    </div>

    <div class="footer">
      <div class="date" id="footerDate">-- DE JUNIODE 2026</div>
      <div class="handle">@elojofc</div>
    </div>
  </div>

  <!-- CONTROL PANEL FLOTANTE (Invisible en capturas limpias) -->
  <div class="controls">
    <button class="primary" id="btnPlay">Mostrar marcadores</button>
    <button id="btnReset">Ocultar</button>
    <button id="btnWhy">Mostrar / ocultar el porqué</button>
    <button id="btnSize">Tamaño real (1080×1920)</button>
    <!-- Botón de Modo Grabación para ocultar los controles -->
    <button id="btnGrabacion" style="background: #e50914; border-color: #e50914;">🔴 Modo Grabación</button>
    <div class="hint">Editás los partidos en <b>partidos.json</b> (misma carpeta). Grabá la pantalla mientras tocás “Mostrar marcadores”. Las banderas van embebidas (offline).</div>
  </div>

  <script>
    // DICCIONARIO DE BANDERAS INTERNAS (Vectores SVG integrados inline)
    const FLAGS = {
      "argentina": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#74acdf"/><rect y=".666" width="3" height=".666" fill="#fff"/><rect y="1.333" width="3" height=".666" fill="#74acdf"/><circle cx="1.5" cy="1" r=".2" fill="#f6b426"/></svg>`,
      "arabia_saudita": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#006c35"/><path d="M0.5 1.3 h2 v0.1 h-2 z" fill="#fff"/><text x="1.5" y="0.9" fill="#fff" font-size="0.3" text-anchor="middle" font-weight="bold">🇸🇦</text></svg>`,
      "mexico": `<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#006847"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#ce1126"/><circle cx="1.5" cy="1" r=".15" fill="#a47c47"/></svg>`,
      "polonia": `<svg viewBox="0 0 3 2"><rect width="3" height="1" fill="#fff"/><rect y="1" width="3" height="1" fill="#dc143c"/></svg>`,
      "francia": `<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#0055a4"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#ef4135"/></svg>`,
      "australia": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#00008b"/><path d="M0 0 h1.5 v1 h-1.5 z" fill="#ff0000"/><text x="2.2" y="1.2" fill="#fff" font-size="0.5">✨</text></svg>`,
      "estados_unidos": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><path d="M0 0 h3 v.15 H0 z M0 .3 h3 v.15 H0 z M0 .6 h3 v.15 H0 z M0 .9 h3 v.15 H0 z M0 1.2 h3 v.15 H0 z M0 1.5 h3 v.15 H0 z M0 1.8 h3 v.15 H0 z" fill="#bd3d44"/><rect width="1.2" height="1.07" fill="#192f5d"/><text x="0.6" y="0.6" fill="#fff" font-size="0.4" text-anchor="middle">⭐</text></svg>`,
      "gales": `<svg viewBox="0 0 3 2"><rect width="3" height="1" fill="#fff"/><rect y="1" width="3" height="1" fill="#00ad43"/><path d="M0.8 1.4 q0.7-0.8 1.4 0" stroke="#cc0000" stroke-width="0.3" fill="none"/></svg>`,
      "espana": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#aa151b"/><rect y="0.5" width="3" height="1" fill="#f1bf00"/><circle cx="0.7" cy="1" r="0.2" fill="#aa151b"/></svg>`,
      "alemania": `<svg viewBox="0 0 3 2"><rect width="3" height=".66" fill="#000"/><rect y=".66" width="3" height=".66" fill="#dd0000"/><rect y="1.33" width="3" height=".66" fill="#ffce00"/></svg>`,
      "japon": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r="0.6" fill="#bc002d"/></svg>`,
      "brasil": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#009c3b"/><path d="M1.5 0.2 L2.8 1 L1.5 1.8 L0.2 1 Z" fill="#ffdf00"/><circle cx="1.5" cy="1" r="0.4" fill="#002776"/></svg>`,
      "portugal": `<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#006600"/><rect x="1" width="2" height="2" fill="#ff0000"/><circle cx="1" cy="1" r="0.3" fill="#ffff00"/></svg>`,
      "uruguay": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><path d="M0 .22 h3 v.22 H0 z M0 .66 h3 v.22 H0 z M0 1.1 h3 v.22 H0 z M0 1.54 h3 v.22 H0 z" fill="#0081c6"/><rect width="1" height="1" fill="#fff"/><circle cx="0.5" cy="0.5" r="0.2" fill="#f4b223"/></svg>`,
      "inglaterra": `<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><path d="M1.35 0 h0.3 v2 h-0.3 z M0 0.85 h3 v0.3 h-3 z" fill="#ce1126"/></svg>`,
      "italia": `<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#009246"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#ce1126"/></svg>`
    };

    let dataPartidos = null;

    // Función para renderizar los partidos procesados desde el JSON
    function renderMatches(data) {
      const container = document.getElementById('matchesContainer');
      const dateEl = document.getElementById('footerDate');
      
      container.innerHTML = '';
      dateEl.innerText = data.fecha_placa.toUpperCase();

      data.partidos.forEach((p, index) => {
        const flagLocal = FLAGS[p.local_key] || '<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#333"/></svg>';
        const flagVisita = FLAGS[p.visita_key] || '<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#333"/></svg>';

        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div class="match-main">
            <div class="team">
              <div class="flag-box">${flagLocal}</div>
              <div class="team-name">${p.local_name}</div>
            </div>
            <div class="score-area">
              <div class="score-box" id="score-l-${index}">${p.goles_local}</div>
              <div class="vs-sign">vs</div>
              <div class="score-box" id="score-v-${index}">${p.goles_visita}</div>
            </div>
            <div class="team">
              <div class="flag-box">${flagVisita}</div>
              <div class="team-name">${p.visita_name}</div>
            </div>
          </div>
          <div class="why-box" id="why-${index}">
            <div class="why-title">¿Por qué?</div>
            <div>${p.porque}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Inicializador: Fetch asincrónico del archivo de configuración JSON
    fetch('partidos.json')
      .then(response => {
        if(!response.ok) throw new Error("No se pudo mapear partidos.json");
        return response.json();
      })
      .then(data => {
        dataPartidos = data;
        renderMatches(data);
      })
      .catch(err => {
        console.error(err);
        document.getElementById('matchesContainer').innerHTML = `<p style="text-align:center;color:red;padding:20px;">Error al leer partidos.json</p>`;
      });

    // SISTEMA DE INTERACCIONES / ANIMACIÓN
    const btnPlay = document.getElementById('btnPlay');
    const btnReset = document.getElementById('btnReset');
    const btnWhy = document.getElementById('btnWhy');
    const btnSize = document.getElementById('btnSize');
    const btnGrabacion = document.getElementById('btnGrabacion');
    const controlsDiv = document.querySelector('.controls');

    // Despacha la animación secuencial en cascada para simular goles en vivo
    btnPlay.onclick = () => {
      if(!dataPartidos) return;
      
      dataPartidos.partidos.forEach((_, index) => {
        setTimeout(() => {
          document.getElementById(`score-l-${index}`).classList.add('reveal');
          document.getElementById(`score-v-${index}`).classList.add('reveal');
        }, index * 600); // 600ms de retraso entre cada partido
      });
    };

    // Resetea los marcadores ocultando sus cajas
    btnReset.onclick = () => {
      document.querySelectorAll('.score-box').forEach(el => el.classList.remove('reveal'));
    };

    // Alterna visualmente la caja aclaratoria del análisis táctico
    btnWhy.onclick = () => {
      document.querySelectorAll('.why-box').forEach(el => el.classList.toggle('show'));
    };

    // Cambia el modo de aspecto general para testeos escalados
    btnSize.onclick = () => {
      document.body.classList.toggle('real-size');
      btnSize.innerText = document.body.classList.contains('real-size') ? "Vista Normal" : "Tamaño real (1080×1920)";
    };

    // LÓGICA MODO GRABACIÓN: Oculta la barra de herramientas por completo
    btnGrabacion.onclick = (e) => {
      e.stopPropagation(); // Evita que se dispare el evento click del body de inmediato
      controlsDiv.style.display = 'none';
      document.body.style.paddingBottom = '40px'; // Ajusta el espacio inferior de la web
    };

    // SISTEMA DE RECUPERACIÓN: Si hacés clic en el fondo negro, los botones vuelven a aparecer
    document.body.onclick = () => {
      if (controlsDiv.style.display === 'none') {
        controlsDiv.style.display = 'flex';
        document.body.style.paddingBottom = '150px'; // Restaura el margen original
      }
    };
  </script>
</body>
</html>
